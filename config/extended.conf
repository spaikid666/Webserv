server {
    listen 8080;
    host 127.0.0.1;
    server_name example.com www.example.com;

    client_max_body_size 10M;

    error_page 404 /error_pages/404.html;
    error_page 500 502 503 504 /error_pages/50x.html;

    root /var/www/advanced;
    index index.html index.htm;

    # Basic route
    location / {
        allow_methods GET;
        autoindex on;
    }

    # HTTP Redirection
    location /old-page {
        return 301 http://example.com/new-page;
    }

    # Route with a different root (Alias equivalent)
    location /images {
        allow_methods GET;
        root /var/www/media;
        autoindex off;
    }

    # File Uploads route
    location /upload {
        allow_methods POST GET;
        client_max_body_size 50M;
        upload_store /var/www/uploads;
    }

    # CGI Execution route
    location *.py {
        allow_methods GET POST;
        cgi_pass /usr/bin/python3;
    }
}

# Default Server Fallback (Different Port)
server {
    listen 8081;
    host 0.0.0.0;
    server_name default_server;

    root /var/www/default;

    location / {
        allow_methods GET;
        index default.html;
    }
}