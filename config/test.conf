server {
    listen 8080;
    host 127.0.0.1;
    server_name example;
    client_max_body_size M;
    error_page 404 /error_pages/404.html;
    root /var/www/advanced;
    index index.html index.htm;

    location / {
        allow_methods GET;
        autoindex on;
		upload ./www/uploads
    }

    location /old-page {
        return 301 http://example.com/new-page;
    }

    location /images {
        allow_methods GET;
        root /var/www/media;
        autoindex off;
    }

    location /upload {
        allow_methods POST GET;
        client_max_body_size 50M;
        upload /var/www/uploads;
    }

    location /cgi-bin {
        allow_methods GET POST;
		cgi_ext .py;
        cgi_path /usr/bin/python3;
    }
}

